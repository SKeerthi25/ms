<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | MS TVK LTD</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png" />
  <link rel="apple-touch-icon" href="/images/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <header id="header">
    <div class="logo"><a href="/" style="text-decoration:none; color:inherit;">MS <span>TVK LTD</span></a></div>
    <nav id="nav">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/gallery.html" class="active">Gallery</a></li>
        <li><a href="/services.html">Services</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/collections.html">Collections</a></li>
        <li><a href="/blog.html">Blog</a></li>
        <li><a href="/pricing.html">Pricing</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></div>
  </header>

  <main style="padding-top: var(--header-height);">
    <section class="portfolio-container" style="padding-top: 50px;">
      <div class="container" style="text-align:center;">
        <h2 style="font-size:4rem; margin-bottom:50px;">Visual <span>Collections</span></h2>
        
        <div class="filter-controls">
          <button class="filter-btn active" data-filter="all">All Excellence</button>
          <button class="filter-btn" data-filter="wildlife">Wildlife</button>
          <button class="filter-btn" data-filter="wedding">Weddings</button>
          <button class="filter-btn" data-filter="portrait">Portraits</button>
          <button class="filter-btn" data-filter="nature">Nature</button>
          <button class="filter-btn" data-filter="commercial">Commercial</button>
          <button class="filter-btn" data-filter="event">Events</button>
        </div>

        <div class="gallery-grid" id="main-gallery">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <div id="close-lightbox" class="lightbox-close">×</div>
    <div class="lightbox-content">
      <img id="lightbox-img" class="lightbox-img" src="" alt="Galllery Image Preview">
      <div class="lightbox-nav">
        <div id="prev-btn" class="lightbox-arrow">‹</div>
        <div id="next-btn" class="lightbox-arrow">›</div>
      </div>
      <div class="lightbox-info">
        <h3 id="lightbox-title">Image Title</h3>
        <p id="lightbox-category" style="color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; font-size:0.8rem;"></p>
        <a id="view-details-btn" href="#" class="btn btn-outline" style="margin-top: 20px; font-size: 0.7rem; padding: 10px 20px;">Story Behind Image</a>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
